name: Actualizar Enlace M3U8

on:
  schedule:
    - cron: '0 */4 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Clonar repositorio con Token Privado
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.MI_TOKEN_SECRETO }}

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Instalar yt-dlp
      run: |
        python -m pip install --upgrade pip
        pip install yt-dlp

    - name: Ejecutar Extractor
      run: python extractor.py

    - name: Guardar y subir cambios a GitHub
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        git add live.m3u8
        git commit -m "Actualizacion automatica del enlace HLS" || exit 0
        git push origin main
