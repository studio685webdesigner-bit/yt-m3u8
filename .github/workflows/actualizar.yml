name: Actualizar Enlace M3U8

on:
  schedule:
    # Se ejecuta automaticamente cada 4 horas (Hora UTC)
    - cron: '0 */4 * * *'
  workflow_dispatch: # Te permite activar el proceso manualmente con un boton

permissions:
  contents: write # Permiso obligatorio para que GitHub guarde el archivo en tu cuenta

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Clonar repositorio
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Instalar yt-dlp actualizado
      run: |
        python -m pip install --upgrade pip
        pip install yt-dlp

    - name: Ejecutar Extractor
      run: python extractor.py

    - name: Guardar y subir cambios a GitHub
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        git add live.m3u8
        git commit -m "Actualizacion automatica del enlace HLS" || exit 0
        git push
